services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_redis_password}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-secure_redis_password} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: always
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: app/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local_dev_secret_key}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password123}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      AUTH_RATE_LIMIT_PER_WINDOW: ${AUTH_RATE_LIMIT_PER_WINDOW:-10}
      JOB_SUBMIT_RATE_LIMIT_PER_WINDOW: ${JOB_SUBMIT_RATE_LIMIT_PER_WINDOW:-30}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
      MAX_PAYLOAD_BYTES: ${MAX_PAYLOAD_BYTES:-16384}
      USER_DB_PATH: /app/data/users.db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/liveness', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - api_data:/app/data
    networks:
      - internal

  worker:
    build:
      context: ..
      dockerfile: app/Dockerfile
    command: python -m app.worker
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379/0
      WORKER_SIMULATED_WORK_SECONDS: ${WORKER_SIMULATED_WORK_SECONDS:-2}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  api_data:
